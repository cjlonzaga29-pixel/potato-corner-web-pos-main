name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      REDIS_URL: redis://localhost:6379
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up test environment
        # apps/api/vitest.setup.ts loads apps/api/.env via dotenv/config at
        # test-file-import time. .env is correctly gitignored, so CI has no
        # env vars unless we provide them. .env.example's placeholder values
        # are non-secret strings that already satisfy config/index.ts's zod
        # schema (`.min(1)` string checks, no real-secret format enforced) —
        # copying it in is enough for tests that import real (non-mocked)
        # modules at the top of the config-dependent import chain, without
        # committing or referencing any actual secret.
        run: cp .env.example apps/api/.env

      - name: Generate Prisma client
        run: pnpm --filter @potato-corner/api exec prisma generate

      - name: Type-check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Unit and integration tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
