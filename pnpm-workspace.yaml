packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  bcrypt: true
  core-js: false
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - "@sentry/cli"
  - bcrypt
  - esbuild
  - msgpackr-extract
  - sharp
  - unrs-resolver
