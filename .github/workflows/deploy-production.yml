name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      REDIS_URL: redis://localhost:6379
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up test environment
        # See ci.yml's identical step — vitest.setup.ts loads apps/api/.env
        # via dotenv/config at test-file-import time, and .env is gitignored.
        run: cp .env.example apps/api/.env

      - name: Generate Prisma client
        run: pnpm --filter @potato-corner/api exec prisma generate

      - name: Full CI validation
        run: |
          pnpm run type-check
          pnpm run lint
          pnpm run test
          pnpm run build

      # Manual approval is enforced via the "production" GitHub Environment's
      # required reviewers setting, not a workflow step.

      - name: Run database migrations (production)
        # Uses the direct (non-pooled) connection string, not the pooler
        # secret below — the session pooler caps concurrent clients at 15
        # and migrate deploy needs a session-level connection of its own.
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL_DIRECT }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DATABASE_URL_DIRECT }}

      - name: Deploy apps/api to Render (production)
        # Skips instead of failing the run when the Render service (and its
        # deploy hook secret) hasn't been provisioned yet — migrations above
        # already ran against the real production DB regardless.
        if: ${{ env.RENDER_DEPLOY_HOOK_PRODUCTION != '' }}
        env:
          RENDER_DEPLOY_HOOK_PRODUCTION: ${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_PRODUCTION"

      # apps/web needs no step here — Vercel's GitHub integration auto-deploys
      # on push to `main` directly, independent of this workflow.

      # TODO: run Playwright smoke tests against production, then create a
      # GitHub release with an auto-generated changelog.
